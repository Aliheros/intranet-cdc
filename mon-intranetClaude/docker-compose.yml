version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: intranet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: intranet
      POSTGRES_PASSWORD: intranet_dev
      POSTGRES_DB: intranet_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
