<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polices — Titres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Outfit:wght@600;700;800&family=Manrope:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,700;0,9..40,800&family=Space+Grotesk:wght@600;700&family=Lexend:wght@600;700;800&family=Nunito:wght@700;800&family=Poppins:wght@700;800&family=Montserrat:wght@700;800&family=Raleway:wght@700;800&family=Urbanist:wght@700;800&family=Figtree:wght@700;800&family=Be+Vietnam+Pro:wght@700;800&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Epilogue:wght@700;800&family=Syne:wght@700;800&family=Exo+2:wght@700;800&family=Jost:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b2a;
      color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: #111d2e;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    aside header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    aside header .label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }
    aside header .title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .font-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    .font-list::-webkit-scrollbar { width: 4px; }
    .font-list::-webkit-scrollbar-track { background: transparent; }
    .font-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .font-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .font-item:hover { background: rgba(255,255,255,0.04); }
    .font-item.active {
      border-left-color: #4f8ef7;
      background: rgba(79,142,247,0.08);
    }
    .font-item .f-name {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    .font-item.active .f-name { color: #4f8ef7; }
    .font-item .f-tag {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }
    .font-item .current-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar .font-name-big {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      transition: opacity 0.2s;
    }
    .topbar .font-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }
    .btn-select {
      background: #4f8ef7;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-select:hover { background: #3b7de8; transform: translateY(-1px); }
    .btn-select:active { transform: translateY(0); }

    /* PREVIEW AREA */
    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px 40px 48px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .preview-area::-webkit-scrollbar { width: 4px; }
    .preview-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Blocs de preview */
    .preview-block {
      background: #111d2e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .preview-block::before {
      content: attr(data-label);
      position: absolute;
      top: 12px; right: 16px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    /* Bloc 1 : Titres purs */
    .block-titles .t1 {
      font-size: 38px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: #fff;
      margin-bottom: 10px;
    }
    .block-titles .t2 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      color: rgba(255,255,255,0.65);
    }

    /* Bloc 2 : Simulation page intranet */
    .block-app {
      background: #f0f4ff;
      color: #1a2236;
    }
    .block-app::before { color: rgba(26,34,54,0.25); }
    .app-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e63946;
      margin-bottom: 6px;
      font-family: 'DM Sans', sans-serif;
    }
    .app-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #0f2d5e;
      margin-bottom: 18px;
    }
    .app-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .app-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(15,45,94,0.08);
    }
    .app-card .card-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(26,34,54,0.4);
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 4px;
    }
    .app-card .card-value {
      font-size: 20px;
      font-weight: 800;
      color: #0f2d5e;
    }
    .app-card .card-sub {
      font-size: 10px;
      color: rgba(26,34,54,0.45);
      font-family: 'DM Sans', sans-serif;
      margin-top: 1px;
    }

    /* Bloc 3 : Texte mixte */
    .block-mix .mix-section-title {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 8px;
    }
    .block-mix .mix-body {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 14px;
    }
    .block-mix .mix-kpi {
      font-size: 30px;
      font-weight: 800;
      color: #4f8ef7;
    }
    .block-mix .mix-kpi-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-family: 'DM Sans', sans-serif;
    }

    /* Bloc 4 : Sidebar simulation */
    .block-sidebar-sim {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    .sim-sidebar {
      width: 140px;
      flex-shrink: 0;
      background: #0f2d5e;
      border-radius: 10px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sim-logo {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .sim-nav-item {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      padding: 5px 8px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
    }
    .sim-nav-item.active-nav {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
    }
    .sim-content {
      flex: 1;
      background: #f0f4ff;
      border-radius: 10px;
      padding: 18px 20px;
      color: #1a2236;
    }
    .sim-page-title {
      font-size: 22px;
      font-weight: 800;
      color: #0f2d5e;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .sim-page-sub {
      font-size: 11px;
      color: rgba(26,34,54,0.4);
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 14px;
    }
    .sim-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sim-row {
      background: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      color: rgba(26,34,54,0.6);
      border: 1px solid rgba(15,45,94,0.06);
    }

    /* SIZE COMPARE */
    .block-sizes .size-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .block-sizes .size-row:last-child { margin-bottom: 0; }
    .block-sizes .size-tag {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      width: 28px;
      flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .block-sizes .size-text {
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }

    /* NAV DOTS */
    .nav-dots {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      padding: 12px 0 0;
      flex-shrink: 0;
    }
    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: background 0.15s, width 0.15s;
    }
    .nav-dot.active { background: #4f8ef7; width: 18px; border-radius: 3px; }

    /* Animations */
    .fade { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<aside>
  <header>
    <div class="label">18 polices</div>
    <div class="title">Choisir un titre</div>
  </header>
  <div class="font-list" id="fontList"></div>
</aside>

<main>
  <div class="topbar">
    <div>
      <div class="font-name-big" id="topFontName">Plus Jakarta Sans</div>
      <div class="font-meta" id="topFontMeta">Actuelle · Géométrique moderne</div>
    </div>
    <button class="btn-select" onclick="copyFont()">Copier le nom</button>
  </div>

  <div class="preview-area" id="previewArea"></div>
</main>

<script>
const fonts = [
  { name: "Plus Jakarta Sans", tag: "SaaS moderne",      desc: "Actuelle · Géométrique moderne",    current: true  },
  { name: "Outfit",             tag: "Géométrique",       desc: "Propre, contemporaine"                             },
  { name: "Manrope",            tag: "Humaniste",         desc: "Chaleureuse, très accessible"                      },
  { name: "Figtree",            tag: "Amicale",           desc: "Ronde, très lisible"                               },
  { name: "Urbanist",           tag: "Minimaliste",       desc: "Épurée, ultra-moderne"                             },
  { name: "Epilogue",           tag: "Variable",          desc: "Élégante, contemporaine"                           },
  { name: "Jost",               tag: "Géométrique",       desc: "Précise, professionnelle"                          },
  { name: "Space Grotesk",      tag: "Tech",              desc: "Caractère affirmé, original"                       },
  { name: "Bricolage Grotesque",tag: "Expressive",        desc: "Dynamique, moderne"                                },
  { name: "Syne",               tag: "Ancienne",          desc: "Display graphique — l'ancienne"                    },
  { name: "Be Vietnam Pro",     tag: "Neutre",            desc: "Professionnelle, bien lisible"                     },
  { name: "DM Sans",            tag: "Neutre",            desc: "Discrète, très propre"                             },
  { name: "Poppins",            tag: "Populaire",         desc: "Ronde, universelle"                                },
  { name: "Montserrat",         tag: "Impactante",        desc: "Forte présence, bien connue"                       },
  { name: "Raleway",            tag: "Élégante",          desc: "Raffinée, légèrement décorative"                   },
  { name: "Nunito",             tag: "Douce",             desc: "Très accessible, arrondie"                         },
  { name: "Lexend",             tag: "Accessibilité",     desc: "Conçue pour maximiser la lecture"                  },
  { name: "Exo 2",              tag: "Futuriste",         desc: "Tech, énergique"                                   },
];

let activeFont = fonts[0];

// Build sidebar
const listEl = document.getElementById("fontList");
fonts.forEach((f, i) => {
  const item = document.createElement("div");
  item.className = "font-item" + (i === 0 ? " active" : "");
  item.dataset.idx = i;
  item.innerHTML = `<div class="f-name" style="font-family:'${f.name}',sans-serif">${f.name}${f.current ? '<span class="current-dot"></span>' : ''}</div><div class="f-tag">${f.tag}</div>`;
  item.addEventListener("click", () => selectFont(i));
  listEl.appendChild(item);
});

function selectFont(idx) {
  activeFont = fonts[idx];
  document.querySelectorAll(".font-item").forEach((el, i) => el.classList.toggle("active", i === idx));
  document.getElementById("topFontName").textContent = activeFont.name;
  document.getElementById("topFontMeta").textContent = activeFont.desc;
  renderPreview();
}

function renderPreview() {
  const f = activeFont.name;
  const area = document.getElementById("previewArea");
  area.innerHTML = `
    <!-- TITRES PURS -->
    <div class="preview-block block-titles fade" data-label="Titres seuls">
      <div class="t1" style="font-family:'${f}',sans-serif">Tableau de bord</div>
      <div class="t2" style="font-family:'${f}',sans-serif">Gestion des pôles & projets</div>
    </div>

    <!-- SIMULATION INTRANET -->
    <div class="preview-block block-app fade" data-label="Simulation page">
      <div class="app-eyebrow">Vue d'ensemble</div>
      <div class="app-title" style="font-family:'${f}',sans-serif">Tableau de bord</div>
      <div class="app-cards">
        <div class="app-card">
          <div class="card-label">Actions en cours</div>
          <div class="card-value" style="font-family:'${f}',sans-serif">24</div>
          <div class="card-sub">↑ 3 cette semaine</div>
        </div>
        <div class="app-card">
          <div class="card-label">Tâches complétées</div>
          <div class="card-value" style="font-family:'${f}',sans-serif">87%</div>
          <div class="card-sub">Objectif : 90%</div>
        </div>
        <div class="app-card">
          <div class="card-label">Membres actifs</div>
          <div class="card-value" style="font-family:'${f}',sans-serif">14</div>
          <div class="card-sub">Sur 18 membres</div>
        </div>
      </div>
    </div>

    <!-- SIMULATION SIDEBAR + PAGE -->
    <div class="preview-block fade" data-label="Contexte interface" style="padding:16px;">
      <div class="block-sidebar-sim">
        <div class="sim-sidebar">
          <div class="sim-logo" style="font-family:'${f}',sans-serif">Mon<br/>Intranet</div>
          <div class="sim-nav-item">Accueil</div>
          <div class="sim-nav-item active-nav">Dashboard</div>
          <div class="sim-nav-item">Annuaire</div>
          <div class="sim-nav-item">Planning</div>
        </div>
        <div class="sim-content">
          <div class="sim-page-title" style="font-family:'${f}',sans-serif">Communication</div>
          <div class="sim-page-sub">Pôle · Cycle 2025-2026</div>
          <div class="sim-rows">
            <div class="sim-row">Réunion hebdomadaire — Mardi 10h</div>
            <div class="sim-row">Rapport de mi-année en cours</div>
            <div class="sim-row">Nouvelle action créée par Sarah</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAILLES -->
    <div class="preview-block block-sizes fade" data-label="Hiérarchie des tailles">
      <div class="size-row"><span class="size-tag">38px</span><span class="size-text" style="font-size:38px;font-family:'${f}',sans-serif">Tableau de bord</span></div>
      <div class="size-row"><span class="size-tag">28px</span><span class="size-text" style="font-size:28px;font-family:'${f}',sans-serif">Gestion des pôles</span></div>
      <div class="size-row"><span class="size-tag">20px</span><span class="size-text" style="font-size:20px;font-family:'${f}',sans-serif">Section Trésorerie</span></div>
      <div class="size-row"><span class="size-tag">15px</span><span class="size-text" style="font-size:15px;font-family:'${f}',sans-serif">Sous-titre de carte</span></div>
    </div>
  `;
}

function copyFont() {
  navigator.clipboard.writeText(activeFont.name)
    .then(() => alert(`"${activeFont.name}" copié !`))
    .catch(() => prompt("Copie ce nom :", activeFont.name));
}

// Keyboard navigation
document.addEventListener("keydown", e => {
  const idx = fonts.indexOf(activeFont);
  if (e.key === "ArrowDown" && idx < fonts.length - 1) selectFont(idx + 1);
  if (e.key === "ArrowUp" && idx > 0) selectFont(idx - 1);
});

renderPreview();
</script>
</body>
</html>
