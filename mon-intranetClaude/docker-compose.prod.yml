version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: intranet-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # En production : NE PAS exposer le port sur l'hôte
    # Le backend communique via le réseau Docker interne
    expose:
      - "5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - intranet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intranet-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - intranet_network

volumes:
  postgres_data_prod:
  uploads_data:

networks:
  intranet_network:
    driver: bridge
